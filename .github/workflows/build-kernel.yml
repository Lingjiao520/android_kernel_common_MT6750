name: MT6750 k63v2 APatch Fix All
on:
  workflow_dispatch

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: 修复DTC版本冲突 必加
        run: |
          sudo apt update
          sudo apt remove -y device-tree-compiler
          sudo apt install -y dtc

      - name: 基础依赖
        run: |
          sudo apt install -y git build-essential flex bison libncurses-dev libssl-dev bc lzop python3 python3-pip

      - name: GCC4.9
        run: git clone https://github.com/LineageOS/android_prebuilts_gcc_linux-x86_aarch64_aarch64-linux-android-4.9 gcc

      - name: 修复DrvGen权限&python2转3
        run: |
          chmod -R 755 ./tools/dct/
          sed -i 's/#!/usr/bin/python/#!/usr/bin/python3/g' ./tools/dct/DrvGen.py

      - name: 加载机型配置
        run: |
          export ARCH=arm64
          export CROSS_COMPILE=$(pwd)/gcc/bin/aarch64-linux-android-
          make mrproper
          make k63v2_64_bsp_defconfig

      - name: APatch必备KALLSYMS
        run: |
          export ARCH=arm64
          export CROSS_COMPILE=$(pwd)/gcc/bin/aarch64-linux-android-
          sed -i 's/# CONFIG_KALLSYMS_ALL is/CONFIG_KALLSYMS_ALL=y/' .config
          make olddefconfig

      - name: 编译内核
        run: |
          export ARCH=arm64
          export CROSS_COMPILE=$(pwd)/gcc/bin/aarch64-linux-android-
          make -j$(nproc) Image.gz-dtb

      - name: 输出内核
        uses: actions/upload-artifact@v4
        with:
          name: MT6750_APatch
          path: arch/arm64/boot/Image.gz-dtb

