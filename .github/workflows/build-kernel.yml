name: Build MT6763 Kernel (2-Stage)

on: workflow_dispatch

jobs:
  # ==================== 第一阶段：环境依赖 ====================
  prepare:
    runs-on: ubuntu-22.04
    steps:
      - name: 安装系统包
        run: |
          sudo apt update
          sudo apt install -y build-essential flex bison libncurses-dev \
                              libssl-dev bc device-tree-compiler \
                              gcc-9 g++-9
          sudo add-apt-repository -y ppa:deadsnakes/ppa
          sudo apt install -y python2
          sudo ln -sf /usr/bin/python2 /usr/bin/python

      - name: 获取 GCC 4.9 交叉编译器（或从缓存恢复）
        uses: actions/cache@v4
        id: cache-gcc
        with:
          path: gcc
          key: gcc49-${{ runner.os }}-${{ hashFiles('.github/workflows/*.yml') }}
          restore-keys: |
            gcc49-${{ runner.os }}-

      - name: 如果缓存未命中，则下载编译器
        if: steps.cache-gcc.outputs.cache-hit != 'true'
        run: |
          git clone --depth=1 https://github.com/LineageOS/android_prebuilts_gcc_linux-x86_aarch64_aarch64-linux-android-4.9 gcc

      - name: 上传工具链供下一阶段使用
        uses: actions/upload-artifact@v4
        with:
          name: toolchain
          path: gcc/

  # ==================== 第二阶段：编译内核 ====================
  build:
    needs: prepare
    runs-on: ubuntu-22.04
    steps:
      - name: Checkout 源码
        uses: actions/checkout@v4

      - name: 安装系统编译基础包（轻量）
        run: |
          sudo apt update
          sudo apt install -y build-essential flex bison libncurses-dev \
                              libssl-dev bc device-tree-compiler gcc-9 g++-9

      - name: 下载第一阶段缓存好的交叉编译器
        uses: actions/download-artifact@v4
        with:
          name: toolchain
          path: gcc

      - name: 修复 DrvGen 权限
        run: sudo chmod -R 777 tools/dct

      - name: 加载机型 defconfig
        run: |
          export ARCH=arm64
          export CROSS_COMPILE=$(pwd)/gcc/bin/aarch64-linux-android-
          export HOSTCC=gcc-9
          export HOSTCXX=g++-9
          make mrproper
          make k63v2_64_bsp_defconfig

      - name: 开启 KALLSYMS_ALL
        run: sed -i 's/# CONFIG_KALLSYMS_ALL/CONFIG_KALLSYMS_ALL=y/' .config

      - name: 跳过 genheaders 构建（使用预生成 SELinux 头文件）
        run: |
          # 注释掉 genheaders 编译，避免 classmap.h 缺失
          sed -i 's/^hostprogs-y.*genheaders/#&/' scripts/selinux/genheaders/Makefile
          # 确保预生成的头文件存在
          if [ ! -f security/selinux/include/flask.h ] || [ ! -f security/selinux/include/av_permissions.h ]; then
            echo "错误：缺少 flask.h 或 av_permissions.h，无法继续"; exit 1
          fi

      - name: 编译内核
        run: |
          export ARCH=arm64
          export CROSS_COMPILE=$(pwd)/gcc/bin/aarch64-linux-android-
          export HOSTCC=gcc-9
          export HOSTCXX=g++-9
          make -j$(nproc) Image.gz-dtb
          cp arch/arm64/boot/Image.gz-dtb vmlinuz

      - name: 上传成品内核
        uses: actions/upload-artifact@v4
        with:
          name: MT6763-boot
          path: |
            arch/arm64/boot/Image.gz-dtb
            vmlinuz
