name: MT6750 k63v2 APatch
on:
  workflow_dispatch

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: 修复DTC yylloc重复冲突
        run: |
          sudo apt update
          sed -i 's/YYLTYPE yylloc;//g' scripts/dtc/dtc-lexer.l

      - name: 安装依赖
        run: |
          sudo apt install -y git build-essential flex bison libncurses-dev libssl-dev bc lzop device-tree-compiler python3 python3-pip

      - name: GCC4.9
        run: git clone https://github.com/LineageOS/android_prebuilts_gcc_linux-x86_aarch64_aarch64-linux-android-4.9 gcc

      - name: DrvGen权限修复
        run: |
          chmod -R 755 ./tools/dct/
          sed -i 's/#!/usr/bin/python/#!/usr/bin/python3/g' ./tools/dtc/DrvGen.py

      - name: 加载k63v2配置
        run: |
          export ARCH=arm64
          export CROSS_COMPILE=$(pwd)/gcc/bin/aarch64-linux-android-
          make mrproper
          make k63v2_64_bsp_defconfig

      - name: APatch全符号
        run: |
          export ARCH=arm64
          export CROSS_COMPILE=$(pwd)/gcc/bin/aarch64-linux-android-
          sed -i 's/# CONFIG_KALLSYMS_ALL is/CONFIG_KALLSYMS_ALL=y/' .config
          make olddefconfig

      - name: 编译内核
        run: |
          export ARCH=arm64
          export CROSS_COMPILE=$(pwd)/gcc/bin/aarch64-linux-android-
          make -j$(nproc) Image.gz-dtb
          
          cp arch/arm64/boot/Image.gz-dtb vmlinuz

      - name: 上传下载包
        uses: actions/upload-artifact@v4
        with:
          name: MT6750-vmlinuz内核
          path: |
            arch/arm64/boot/Image.gz-dtb
            vmlinuz

