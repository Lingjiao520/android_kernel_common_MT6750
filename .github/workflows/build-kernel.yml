name: Build MT6763 Kernel (Final)

on: workflow_dispatch

jobs:
  prepare:
    runs-on: ubuntu-22.04
    steps:
      - name: 安装系统包
        run: |
          sudo apt update
          sudo apt install -y build-essential flex bison libncurses-dev \
                              libssl-dev bc device-tree-compiler \
                              gcc-9 g++-9 libc6-dev-i386
          sudo add-apt-repository -y ppa:deadsnakes/ppa
          sudo apt install -y python2

      - name: 获取交叉编译器（缓存）
        uses: actions/cache@v4
        id: cache-gcc
        with:
          path: gcc
          key: gcc49-${{ runner.os }}-${{ hashFiles('.github/workflows/*.yml') }}
          restore-keys: |
            gcc49-${{ runner.os }}-

      - name: 下载交叉编译器（缓存未命中时）
        if: steps.cache-gcc.outputs.cache-hit != 'true'
        run: git clone --depth=1 https://github.com/LineageOS/android_prebuilts_gcc_linux-x86_aarch64_aarch64-linux-android-4.9 gcc

      - name: 上传工具链
        uses: actions/upload-artifact@v4
        with:
          name: toolchain
          path: gcc/

  build:
    needs: prepare
    runs-on: ubuntu-22.04
    steps:
      - name: 检出源码
        uses: actions/checkout@v4

      - name: 安装编译依赖及 Python 2
        run: |
          sudo apt update
          sudo apt install -y build-essential flex bison libncurses-dev \
                              libssl-dev bc device-tree-compiler gcc-9 g++-9
          sudo add-apt-repository -y ppa:deadsnakes/ppa
          sudo apt install -y python2

      - name: 强制系统 python 为 python2
        run: |
          sudo update-alternatives --install /usr/bin/python python /usr/bin/python2 100
          sudo update-alternatives --set python /usr/bin/python2
          python --version

      - name: 下载交叉编译器
        uses: actions/download-artifact@v4
        with:
          name: toolchain
          path: gcc

      - name: 修复交叉编译器权限并加入 PATH
        run: |
          chmod -R +x gcc
          sudo ln -sf $(pwd)/gcc/bin/* /usr/local/bin/

      - name: 赋予脚本权限
        run: |
          sudo chmod -R 777 tools/dct
          chmod +x scripts/dtc/dtc_overlay 2>/dev/null || true
          find scripts -name "*.sh" -exec chmod +x {} \;

      - name: 下载缺失的内核源码文件 (entry.S 等)
        run: |
          # 如果 arch/arm64/kernel/entry.S 不存在，从 AOSP 4.9 镜像获取
          if [ ! -f arch/arm64/kernel/entry.S ]; then
            curl -sL -o arch/arm64/kernel/entry.S \
              "https://raw.githubusercontent.com/aosp-mirror/kernel_common/android-4.9/arch/arm64/kernel/entry.S"
          fi

      - name: 修复 DTC 及 extract-cert 编译错误
        run: |
          echo 'HOST_EXTRACFLAGS += -fcommon' >> scripts/dtc/Makefile
          sed -i 's/-Werror//g' scripts/dtc/Makefile
          sed -i 's/-Werror//g' scripts/Makefile.host 2>/dev/null || true
          sed -i 's/-Werror//g' scripts/Makefile 2>/dev/null || true

      - name: 下载缺失的 SELinux 头文件
        run: |
          mkdir -p security/selinux/include
          for f in flask.h av_permissions.h classmap.h; do
            if [ ! -f security/selinux/include/$f ]; then
              curl -sL -o security/selinux/include/$f \
                "https://raw.githubusercontent.com/aosp-mirror/kernel_common/android-4.9/security/selinux/include/$f"
            fi
          done

      - name: 加载 defconfig
        run: |
          export ARCH=arm64
          export CROSS_COMPILE=aarch64-linux-android-
          export HOSTCC=gcc-9
          export HOSTCXX=g++-9
          make mrproper
          make k63v2_64_bsp_defconfig

      - name: 调整内核配置 (KALLSYMS, 栈保护, VDSO, INITRAMFS)
        run: |
          # 开启全部符号
          scripts/config --enable CONFIG_KALLSYMS_ALL
          # 关闭不支持的栈保护
          scripts/config --disable CONFIG_CC_STACKPROTECTOR_STRONG
          scripts/config --enable CONFIG_CC_STACKPROTECTOR_NONE
          # 禁用 VDSO
          scripts/config --disable CONFIG_VDSO
          # 彻底禁用 initramfs
          scripts/config --disable CONFIG_BLK_DEV_INITRD
          scripts/config --set-str CONFIG_INITRAMFS_SOURCE ""
          # 更新依赖
          make ARCH=arm64 olddefconfig

      - name: 彻底屏蔽 VDSO 的构建目标
        run: |
          sed -i 's/^\(.*\)vdso_prepare\(.*\)$/#\1vdso_prepare\2 # disabled by CI/' arch/arm64/Makefile

      - name: 编译内核
        run: |
          export ARCH=arm64
          export CROSS_COMPILE=aarch64-linux-android-
          export HOSTCC=gcc-9
          export HOSTCXX=g++-9
          export HOST_EXTRACFLAGS="-Wno-error -Wno-deprecated-declarations"
          make -j$(nproc) Image.gz-dtb
          cp arch/arm64/boot/Image.gz-dtb vmlinuz

      - name: 上传成品内核
        uses: actions/upload-artifact@v4
        with:
          name: MT6763-boot
          path: |
            arch/arm64/boot/Image.gz-dtb
            vmlinuz
