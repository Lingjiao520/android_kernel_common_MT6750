name: Build MT6763 Kernel (2-Stage)

on: workflow_dispatch

jobs:
  # ==================== 第一阶段：准备环境 ====================
  prepare:
    runs-on: ubuntu-22.04
    steps:
      - name: 安装系统包
        run: |
          sudo apt update
          sudo apt install -y build-essential flex bison libncurses-dev \
                              libssl-dev bc device-tree-compiler \
                              gcc-9 g++-9
          sudo add-apt-repository -y ppa:deadsnakes/ppa
          sudo apt install -y python2
          sudo ln -sf /usr/bin/python2 /usr/bin/python

      - name: 获取 GCC 4.9 交叉编译器 (缓存)
        uses: actions/cache@v4
        id: cache-gcc
        with:
          path: gcc
          key: gcc49-${{ runner.os }}-${{ hashFiles('.github/workflows/*.yml') }}
          restore-keys: |
            gcc49-${{ runner.os }}-

      - name: 下载交叉编译器 (缓存未命中时)
        if: steps.cache-gcc.outputs.cache-hit != 'true'
        run: |
          git clone --depth=1 https://github.com/LineageOS/android_prebuilts_gcc_linux-x86_aarch64_aarch64-linux-android-4.9 gcc

      - name: 上传工具链
        uses: actions/upload-artifact@v4
        with:
          name: toolchain
          path: gcc/

  # ==================== 第二阶段：编译内核 ====================
  build:
    needs: prepare
    runs-on: ubuntu-22.04
    steps:
      - name: 检出源码
        uses: actions/checkout@v4

      - name: 安装基础编译包
        run: |
          sudo apt update
          sudo apt install -y build-essential flex bison libncurses-dev \
                              libssl-dev bc device-tree-compiler gcc-9 g++-9

      - name: 下载交叉编译器
        uses: actions/download-artifact@v4
        with:
          name: toolchain
          path: gcc

      - name: 修复 DrvGen 权限
        run: sudo chmod -R 777 tools/dct

      - name: 修复 DTC 多重定义 (yylloc)
        run: |
          # 强制 DTC 使用 -fcommon，根除重复定义
          echo 'HOST_EXTRACFLAGS += -fcommon' >> scripts/dtc/Makefile
          # 顺便关掉可能将警告当成错误的 -Werror (如果有)
          sed -i 's/-Werror//g' scripts/dtc/Makefile

      - name: 下载缺失的 SELinux 头文件
        run: |
          mkdir -p security/selinux/include
          for f in flask.h av_permissions.h classmap.h; do
            if [ ! -f security/selinux/include/$f ]; then
              curl -sL -o security/selinux/include/$f \
                "https://raw.githubusercontent.com/aosp-mirror/kernel_common/android-4.9/security/selinux/include/$f"
            fi
          done
          ls -l security/selinux/include/flask.h security/selinux/include/av_permissions.h security/selinux/include/classmap.h

      - name: 加载 defconfig
        run: |
          export ARCH=arm64
          export CROSS_COMPILE=$(pwd)/gcc/bin/aarch64-linux-android-
          export HOSTCC=gcc-9
          export HOSTCXX=g++-9
          make mrproper
          make k63v2_64_bsp_defconfig

      - name: 开启 KALLSYMS_ALL
        run: sed -i 's/# CONFIG_KALLSYMS_ALL/CONFIG_KALLSYMS_ALL=y/' .config

      - name: 编译内核
        run: |
          export ARCH=arm64
          export CROSS_COMPILE=$(pwd)/gcc/bin/aarch64-linux-android-
          export HOSTCC=gcc-9
          export HOSTCXX=g++-9
          # 再次通过命令行传递 -fcommon，双重保险
          make -j$(nproc) Image.gz-dtb HOSTCFLAGS="-fcommon"
          cp arch/arm64/boot/Image.gz-dtb vmlinuz

      - name: 上传成品内核
        uses: actions/upload-artifact@v4
        with:
          name: MT6763-boot
          path: |
            arch/arm64/boot/Image.gz-dtb
            vmlinuz
