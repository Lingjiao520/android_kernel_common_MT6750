name: MT6750 k63v2 APatch Auto Release
on:
  workflow_dispatch

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: 修复DTC yylloc重复冲突
        run: |
          sudo apt update
          sed -i 's/YYLTYPE yylloc;//g' scripts/dtc/dtc-lexer.l

      - name: 安装全套依赖
        run: |
          sudo apt install -y git build-essential flex bison libncurses-dev libssl-dev bc lzop device-tree-compiler python3 python3-pip

      - name: 下载ARM64 GCC4.9
        run: git clone https://github.com/LineageOS/android_prebuilts_gcc_linux-x86_aarch64_aarch64-linux-android-4.9 gcc

      - name: 修复MTK DrvGen权限&Python3
        run: |
          chmod -R 755 ./tools/dct/
          sed -i 's/#!/usr/bin/python/#!/usr/bin/python3/g' ./tools/dct/DrvGen.py

      - name: 加载k63v2机型配置
        run: |
          export ARCH=arm64
          export CROSS_COMPILE=$(pwd)/gcc/bin/aarch64-linux-android-
          make mrproper
          make k63v2_64_bsp_defconfig

      - name: 开启APatch必备全内核符号
        run: |
          export ARCH=arm64
          export CROSS_COMPILE=$(pwd)/gcc/bin/aarch64-linux-android-
          sed -i 's/# CONFIG_KALLSYMS_ALL is/CONFIG_KALLSYMS_ALL=y/' .config
          make olddefconfig

      - name: 编译内核 Image.gz-dtb
        run: |
          export ARCH=arm64
          export CROSS_COMPILE=$(pwd)/gcc/bin/aarch64-linux-android-
          make -j$(nproc) Image.gz-dtb

      - name: 重命名为vmlinuz
        run: cp arch/arm64/boot/Image.gz-dtb vmlinuz

      - name: 上传发布到Release
        uses: softprops/action-gh-release@v2
        with:
          files: |
            vmlinuz
            arch/arm64/boot/Image.gz-dtb
        token: ${{ secrets.GITHUB_TOKEN }}

