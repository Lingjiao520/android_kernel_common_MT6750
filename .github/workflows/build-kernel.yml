name: Build MT6763 Kernel

on: workflow_dispatch

jobs:
  build:
    runs-on: ubuntu-22.04
    steps:
      - name: Checkout 源码
        uses: actions/checkout@v4

      - name: 安装依赖
        run: |
          sudo apt update
          sudo apt install -y build-essential flex bison libncurses-dev \
                              libssl-dev bc device-tree-compiler
          # 22.04 官方移除了 python2，通过 deadsnakes ppa 安装
          sudo add-apt-repository -y ppa:deadsnakes/ppa
          sudo apt install -y python2
          sudo ln -sf /usr/bin/python2 /usr/bin/python

      - name: 获取 GCC 4.9 交叉编译器
        run: git clone --depth=1 https://github.com/LineageOS/android_prebuilts_gcc_linux-x86_aarch64_aarch64-linux-android-4.9 gcc

      - name: 修复 DrvGen 权限
        run: sudo chmod -R 777 tools/dct

      - name: 加载机型 defconfig
        run: |
          export ARCH=arm64
          export CROSS_COMPILE=$(pwd)/gcc/bin/aarch64-linux-android-
          make mrproper
          make k63v2_64_bsp_defconfig

      - name: 开启 KALLSYMS_ALL
        run: sed -i 's/# CONFIG_KALLSYMS_ALL/CONFIG_KALLSYMS_ALL=y/' .config

      - name: 编译内核
        run: |
          export ARCH=arm64
          export CROSS_COMPILE=$(pwd)/gcc/bin/aarch64-linux-android-
          make -j$(nproc) Image.gz-dtb \
            HOSTCFLAGS="-Wno-deprecated-declarations -fcommon" \
            HOST_EXTRACFLAGS="-Wno-deprecated-declarations"
          cp arch/arm64/boot/Image.gz-dtb vmlinuz

      - name: 上传成品内核
        uses: actions/upload-artifact@v4
        with:
          name: MT6763-boot
          path: |
            arch/arm64/boot/Image.gz-dtb
            vmlinuz
